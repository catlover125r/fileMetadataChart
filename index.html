<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>File Date Chart</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f4f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      color: #18181b;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    p.subtitle {
      color: #71717a;
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 32px;
      width: 100%;
      max-width: 680px;
    }

    .drop-zone {
      border: 2px dashed #d4d4d8;
      border-radius: 10px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 24px;
    }

    .drop-zone.drag-over {
      border-color: #6366f1;
      background: #eef2ff;
    }

    .drop-zone input[type="file"] {
      display: none;
    }

    .drop-zone .icon {
      font-size: 2.4rem;
      margin-bottom: 10px;
    }

    .drop-zone p {
      color: #52525b;
      font-size: 0.95rem;
    }

    .drop-zone span {
      color: #6366f1;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 24px;
    }

    thead th {
      text-align: left;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #71717a;
      padding: 8px 12px;
      border-bottom: 1px solid #e4e4e7;
    }

    thead th:last-child { text-align: right; }

    tbody tr { border-bottom: 1px solid #f4f4f5; }
    tbody tr:last-child { border-bottom: none; }

    tbody td {
      padding: 10px 12px;
      font-size: 0.92rem;
      vertical-align: middle;
    }

    tbody td:last-child { text-align: right; }

    .file-name {
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .date-input {
      border: 1px solid #e4e4e7;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 0.88rem;
      color: #18181b;
      background: #fafafa;
      width: 150px;
    }

    .date-input:focus {
      outline: none;
      border-color: #6366f1;
    }

    .remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #a1a1aa;
      font-size: 1rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }

    .remove-btn:hover { color: #ef4444; }

    .empty-state {
      text-align: center;
      color: #a1a1aa;
      font-size: 0.9rem;
      padding: 20px 0;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      align-items: center;
    }

    .btn-clear {
      background: none;
      border: 1px solid #e4e4e7;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.9rem;
      cursor: pointer;
      color: #52525b;
      transition: border-color 0.15s;
    }

    .btn-clear:hover { border-color: #a1a1aa; }

    .btn-pdf {
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-pdf:hover { background: #4f46e5; }
    .btn-pdf:disabled { background: #c7d2fe; cursor: not-allowed; }

    .count-badge {
      font-size: 0.8rem;
      background: #ede9fe;
      color: #6366f1;
      border-radius: 20px;
      padding: 2px 10px;
      font-weight: 600;
      margin-right: auto;
      align-self: center;
    }
  </style>
</head>
<body>

<h1>File Date Chart</h1>
<p class="subtitle"></p>

<div class="card">
  <div class="drop-zone" id="dropZone">
    <p>Drop files here, or <span onclick="document.getElementById('fileInput').click()">browse</span></p>
    <input type="file" id="fileInput" multiple>
  </div>

  <table id="fileTable">
    <thead>
      <tr>
        <th>File Name</th>
        <th>Date</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="fileList">
      <tr id="emptyRow">
        <td colspan="3" class="empty-state">No files added yet.</td>
      </tr>
    </tbody>
  </table>

  <div class="actions">
    <span class="count-badge" id="countBadge" style="display:none"></span>
    <button class="btn-clear" onclick="clearAll()">Clear all</button>
    <button class="btn-pdf" id="exportBtn" onclick="exportPDF()" disabled>Export PDF</button>
  </div>
</div>

<script>
  const { jsPDF } = window.jspdf;
  let files = [];

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    addFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', e => addFiles(e.target.files));

  function formatDate(ts) {
    const d = new Date(ts);
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
  }

  function addFiles(fileList) {
    const incoming = Array.from(fileList);
    if (incoming.length === 0) return;

    // Find the oldest modified date across all dropped files
    const oldest = Math.min(...incoming.map(f => f.lastModified));
    const oldestDate = formatDate(oldest);

    incoming.forEach(file => {
      const id = Date.now() + Math.random();
      files.push({ id, name: file.name, date: oldestDate });
    });
    renderTable();
    fileInput.value = '';
    exportPDF();
  }

  function renderTable() {
    const tbody = document.getElementById('fileList');
    const exportBtn = document.getElementById('exportBtn');
    const countBadge = document.getElementById('countBadge');

    tbody.innerHTML = '';

    if (files.length === 0) {
      tbody.innerHTML = '<tr id="emptyRow"><td colspan="3" class="empty-state">No files added yet.</td></tr>';
      exportBtn.disabled = true;
      countBadge.style.display = 'none';
      return;
    }

    exportBtn.disabled = false;
    countBadge.style.display = 'inline';
    countBadge.textContent = `${files.length} file${files.length !== 1 ? 's' : ''}`;

    files.forEach(f => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="file-name" title="${f.name}">${f.name}</td>
        <td><input class="date-input" type="date" value="${f.date}" onchange="updateDate('${f.id}', this.value)"></td>
        <td><button class="remove-btn" onclick="removeFile('${f.id}')" title="Remove">✕</button></td>
      `;
      tbody.appendChild(tr);
    });
  }

  function updateDate(id, val) {
    const f = files.find(x => x.id == id);
    if (f) f.date = val;
  }

  function removeFile(id) {
    files = files.filter(x => x.id != id);
    renderTable();
  }

  function clearAll() {
    files = [];
    renderTable();
  }

  function exportPDF() {
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    const pageW = 210;
    const marginL = 16;
    const marginR = 16;
    const usableW = pageW - marginL - marginR;
    const rowH = 10;
    const headerH = 14;

    let y = 20;

    // Title
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(16);
    doc.setTextColor(30, 30, 30);
    doc.text('File Date Chart', marginL, y);
    y += 8;

    // Sub line
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(120, 120, 120);
    const now = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    doc.text(`Generated ${now}`, marginL, y);
    y += 8;

    // Header row background
    doc.setFillColor(99, 102, 241);
    doc.roundedRect(marginL, y, usableW, headerH, 2, 2, 'F');

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.setTextColor(255, 255, 255);
    doc.text('File Name', marginL + 4, y + 9);
    doc.text('Date', pageW - marginR - 4, y + 9, { align: 'right' });
    y += headerH;

    // Rows
    files.forEach((f, i) => {
      if (y > 270) {
        doc.addPage();
        y = 20;
      }

      const bg = i % 2 === 0 ? [250, 250, 252] : [255, 255, 255];
      doc.setFillColor(...bg);
      doc.rect(marginL, y, usableW, rowH, 'F');

      // Divider
      doc.setDrawColor(228, 228, 231);
      doc.line(marginL, y + rowH, marginL + usableW, y + rowH);

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9.5);
      doc.setTextColor(24, 24, 27);

      // Truncate long filenames
      const maxW = usableW - 50;
      const nameStr = doc.splitTextToSize(f.name, maxW)[0];
      doc.text(nameStr, marginL + 4, y + 6.5);

      // Date right aligned
      doc.setTextColor(99, 102, 241);
      doc.setFont('helvetica', 'bold');
      doc.text(f.date || 'No date', pageW - marginR - 4, y + 6.5, { align: 'right' });

      y += rowH;
    });

    // Footer line
    y += 4;
    doc.setDrawColor(200, 200, 210);
    doc.line(marginL, y, marginL + usableW, y);
    y += 5;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(160, 160, 170);
    doc.text(`${files.length} file${files.length !== 1 ? 's' : ''} total`, marginL, y);

    doc.save('file-date-chart.pdf');
  }
</script>
</body>
</html>
